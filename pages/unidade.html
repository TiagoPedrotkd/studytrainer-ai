<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Unidade de estudo — Treinador Desportivo">
  <meta name="theme-color" content="#1a1f2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StudyTrainer">
  <title>Unidade — StudyTrainer</title>
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../icons/icon.svg">
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/content.css">
  <link rel="stylesheet" href="../styles/readability.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <a id="unit-back" href="../index.html" class="btn-back" aria-label="Voltar às unidades">←</a>
      <div class="header-brand header-brand-compact">
        <div>
          <h1 id="unit-page">Unidade</h1>
          <p id="unit-subtitle" class="subtitle"></p>
        </div>
      </div>
      <div class="header-actions">
        <button id="install-app" class="btn-install" hidden>Instalar</button>
        <button id="theme-toggle" class="btn-icon" aria-label="Alternar modo escuro" title="Alternar tema">
          <span class="theme-icon">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2 id="unit-title">Subunidades</h2>
      <p id="unit-hero-text" class="hero-text"></p>
      <div id="unit-progress" class="unit-progress"></div>
    </section>

    <div id="subunits-grid" class="subunits-grid" role="list">
      <!-- Cards gerados por app.js -->
    </div>
  </main>

  <footer class="app-footer">
    <p>StudyTrainer &copy; 2026</p>
  </footer>

  <script src="../app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js').catch(() => {});
    }
  </script>
</body>
</html>
